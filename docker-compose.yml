version: '3.8'

services:
  database:
    image: mongo:latest
    container_name: kb-assistant-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - kb-network

  backend:
    build: ./backend
    container_name: kb-assistant-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://database:27017/kb-assistant
      - JWT_SECRET=kb_assistant_production_secret_token_change_me
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - database
    networks:
      - kb-network

  frontend:
    build: ./frontend
    container_name: kb-assistant-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - kb-network

volumes:
  mongodb_data:

networks:
  kb-network:
    driver: bridge
